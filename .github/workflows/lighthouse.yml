name: Lighthouse CI (Web Vitals Monitor)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Static Nucleus (SSG)
        # QUÉ HACE: Compila el código estático directamente en el runner de GitHub.
        # POR QUÉ: Genera la carpeta /public fresca para auditarla sin depender de archivos cacheados.
        run: |
          python3 scripts/merci/merci-publish.py

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          budgetPath: ./lighthouserc.json
          uploadArtifacts: true